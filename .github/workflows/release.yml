name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew formula
        # secrets context is not available in `if` expressions, so we check
        # the job-level env var instead.
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          curl -sL "$TARBALL_URL" -o /tmp/source.tar.gz
          SHA=$(sha256sum /tmp/source.tar.gz | awk '{print $1}')

          sed -e "s/VERSION_PLACEHOLDER/$VERSION/g" \
              -e "s/SHA_PLACEHOLDER/$SHA/g" \
              formula/how-to-say.rb > /tmp/how-to-say.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/redodson01/homebrew-tap.git" /tmp/tap
          cd /tmp/tap
          cp /tmp/how-to-say.rb how-to-say.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add how-to-say.rb
          git diff --cached --quiet || { git commit -m "how-to-say ${VERSION}" && git push; }
